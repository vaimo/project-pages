name: Build and push (enable Google login)

on:
  workflow_dispatch:
    inputs:
      enable_google:
        description: 'Enable NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN at build time (true/false)'
        required: false
        default: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: "npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}"
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build (bake NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN)
        env:
          NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN: ${{ github.event.inputs.enable_google }}
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vaimo/project-pages:${{ github.run_id }}-google
          build-args: |
            NEXT_PUBLIC_ENABLE_GOOGLE_LOGIN=${{ github.event.inputs.enable_google }}
